# Global defaults for experiments
name: debug  # Required: experiment name

# Data splitting
test_ratio: 0.25
gap: "1D"

# Parallelism and randomness
n_jobs: 2
random_seed: 42

# Resource management
min_memory_bytes: 20000000000

# Experiment management
overwrite: false
dry_run: false

dataset:
  domain: wind  # Required: wind or pv
  asset_id: T11  # Required
  type: digital_twin  # forecast_available or digital_twin

# Model configuration
model:
  name: mlp  # Required: mlp, lgbm, gp, xgboost, rf

# Feature selection
feature_selection:
  method: CSFS  # Required: SFS, CSFS, mutual_info, f_value, RF_FI
  direction: backward  # forward or backward (required for SFS/CSFS)
  clustering:
    method: random
    group_size: 3
  val_ratio: 0.333333
  fast_mode: true
  resume_at_iteration: null
  n_features: 2  # Required

# Hyperparameter optimization
hpo:
  mode: per_iteration  # on, off, per_iteration, per_feature_set
  feature_level_mode: "off"
  time_budget: null
  max_iter: 25
  early_stop: true
  train_time_limit: 60

# Warm start configuration
warm_start:
  enabled: false
  time_budget: null
  max_iter: null
  early_stop: true

# Evaluation
evaluation:
  cv: false
  n_folds: null
  bootstrapping: true
  n_bootstrap_samples: 100
  n_subags: 5
  subag_fraction: 0.9
  block_size: "1D"

# Report
report:
  exclude_figures: false
  exclude_latex: false
  exclude_csv: false

