# Paper experiment matrix - defines experiment space for paper experiments
# All dimensions respect schema hierarchy (nested structure)
defaults:
  - ../base.yaml

dimensions:
  dataset:
    domain: [pv, wind]
    asset_id: ["01", T11]
    type: [digital_twin, forecast_available]

  model:
    name: [mlp, lgbm, xgboost]

  feature_selection:
    method: [SFS, CSFS, mutual_info, f_value, RF_FI]
    direction: [forward, backward, null] # Only for SFS and CSFS
    clustering:
      method: [correlation, random, feature_importance, null] # Only for CSFS
      group_size: [3, null]
    n_features: [2, 3, 5, 8, 10]

  hpo:
    mode: ["per_iteration", "on", "off"]

constraints:
  # Domain-asset_id pairing
  - when: { dataset.domain: wind }
    then: { dataset.asset_id: T11 }
    else: { dataset.asset_id: "01" }

  # Direction required for SFS and CSFS - only set to null for other methods
  - when: { feature_selection.method: [SFS, CSFS] }
    then: { feature_selection.direction: [forward, backward] }
    else: { feature_selection.direction: null }

  # HPO mode depends on feature selection method
  - when: { feature_selection.method: CSFS }
    then:
      hpo:
        mode: "per_iteration"
      feature_selection:
        clustering:
          method: [correlation, random, feature_importance]
    else:
      feature_selection:
        clustering:
          method: null
          group_size: null

  - when: { feature_selection.method: [SFS, RF_FI] }
    then:
      hpo:
        mode: "on"

  - when: { feature_selection.method: [mutual_info, f_value] }
    then:
      hpo:
        mode: "off"

  # Group size not required for correlation clustering in CSFS
  - when:
      {
        feature_selection.method: CSFS,
        feature_selection.clustering.method: [random, feature_importance],
      }
    then:
      feature_selection:
        clustering:
          group_size: 3
    else:
      feature_selection:
        clustering:
          group_size: null

naming:
  separator: "_"
  base_parts:
    - field: dataset.domain
    - field: dataset.asset_id
      join_with: "-" # Join with previous: creates "domain-asset_id"
    - field: model.name
    - field: feature_selection.n_features
      template: "n-{value}"
    - field: dataset.type
    - field: hpo.mode
      template: "hpo-{value}"
  conditional_parts:
    # CSFS method: add clustering method and HPO mode
    - when: { feature_selection.method: CSFS }
      parts:
        - field: feature_selection.clustering.method
          template: "csfs-{value}"
    # Other filter methods: add method name in lowercase
    - when: { feature_selection.method: [mutual_info, f_value, RF_FI, SFS] }
      parts:
        - field: feature_selection.method
          transform: lowercase
    # Optional: add direction if specified (for SFS/CSFS with direction)
    # Note: Only added if direction is explicitly set in parameters
    - when: { feature_selection.direction: [forward, backward] }
      parts:
        - field: feature_selection.direction
